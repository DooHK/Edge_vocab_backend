# Render + TiDB Cloud deployment configuration

# MySQL (TiDB Cloud - SSL required)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslMode=REQUIRED&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=2592000000

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID}

# Google Translate API
google.translate.api-key=${GOOGLE_TRANSLATE_API_KEY:}

# Toss Payments
toss.client-key=${TOSS_CLIENT_KEY:}
toss.secret-key=${TOSS_SECRET_KEY:}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Server (Render assigns PORT automatically)
server.port=${PORT:8080}
